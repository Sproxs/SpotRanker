<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpotRanker</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the original URL and redirects to index.html
      // The app will restore the URL via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
